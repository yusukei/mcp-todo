services:
  nginx:
    image: nginx:alpine
    container_name: todo-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    networks:
      - todo-net

  # ── backend (API workers, multi-worker default) ────────
  #
  # The API container runs the HTTP / MCP / WebSocket / chat /
  # agent transport surface with ``WEB_CONCURRENCY=2`` by
  # default. Tantivy writes and the clip queue run in the
  # ``backend-indexer`` sidecar, so this container sets
  # ``ENABLE_INDEXERS=0 ENABLE_CLIP_QUEUE=0``.
  #
  # Rollback to single-process mode (emergency):
  #   ENABLE_INDEXERS=1 ENABLE_CLIP_QUEUE=1 WEB_CONCURRENCY=1 \
  #   docker compose up -d
  # and stop the backend-indexer container. The tantivy volumes
  # are still mounted below so the rollback path still works
  # without editing docker-compose.yml.
  #
  # See docs/architecture/multi-worker-sidecar.md for the full
  # topology diagram and the migration plan.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo-backend
    environment:
      - MONGO_URI=mongodb://${MONGO_USER:-todoadmin}:${MONGO_PASSWORD:-changeme}@mongo:27017/${MONGO_DBNAME:-claude_todo}?authSource=admin
      - MONGO_DBNAME=${MONGO_DBNAME:-claude_todo}
      - REDIS_URI=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - REDIS_MCP_URI=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/1
      - SECRET_KEY=${SECRET_KEY}
      - REFRESH_SECRET_KEY=${REFRESH_SECRET_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - BASE_URL=${BASE_URL:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - INIT_ADMIN_EMAIL=${INIT_ADMIN_EMAIL:-}
      - INIT_ADMIN_PASSWORD=${INIT_ADMIN_PASSWORD:-}
      - WEBAUTHN_RP_NAME=${WEBAUTHN_RP_NAME:-MCP Todo}
      - SEARCH_INDEX_DIR=/app/search_index
      - DOCSITE_ASSETS_DIR=/app/docsite_assets
      - DOCSITE_INDEX_DIR=/app/search_index_docsites
      - BOOKMARK_ASSETS_DIR=/app/bookmark_assets
      - BOOKMARK_INDEX_DIR=/app/search_index_bookmarks
      - AGENT_RELEASES_DIR=/app/agent_releases
      # Subsystem gates — see docs/architecture/multi-worker-sidecar.md
      # and the ``backend-indexer`` service below. Defaults
      # correspond to the multi-worker topology. Flip to 1 / 1 / 1
      # on the host (plus WEB_CONCURRENCY=1) as an emergency
      # single-process rollback.
      - ENABLE_API=${ENABLE_API:-1}
      - ENABLE_INDEXERS=${ENABLE_INDEXERS:-0}
      - ENABLE_CLIP_QUEUE=${ENABLE_CLIP_QUEUE:-0}
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-2}
    volumes:
      # Index volumes stay mounted so the emergency rollback
      # (ENABLE_INDEXERS=1) still writes to the correct path.
      # The sidecar also mounts these — only one writer at a
      # time is safe, which the ENABLE_INDEXERS flag enforces.
      - search_index:/app/search_index
      - docsite_assets:/app/docsite_assets
      - docsite_index:/app/search_index_docsites
      - bookmark_assets:/app/bookmark_assets
      - bookmark_index:/app/search_index_bookmarks
      - agent_releases:/app/agent_releases
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1536M
    restart: unless-stopped
    networks:
      - todo-net

  # ── backend-indexer (sidecar, always runs) ─────────────
  #
  # Owns the Tantivy writers and the clip queue worker. The
  # ``backend`` service runs with ENABLE_INDEXERS=0 and
  # ENABLE_CLIP_QUEUE=0 by default (see above), and this
  # container picks up the slack:
  #   - Subscribes to the ``index:tasks`` Redis Stream
  #     published by the backend API workers.
  #   - Re-reads each notified document from MongoDB before
  #     updating its Tantivy index.
  #   - Runs ``clip_queue.recover_pending()`` at startup and
  #     processes new bookmark clip requests.
  #
  # WEB_CONCURRENCY MUST be 1 — Tantivy IndexWriter is a
  # single-writer resource, so more than one worker here
  # corrupts the index.
  #
  # Emergency rollback: stop this container and flip the
  # backend service's ENABLE_INDEXERS / ENABLE_CLIP_QUEUE back
  # to 1 (plus WEB_CONCURRENCY=1). No data migration needed.
  backend-indexer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo-backend-indexer
    environment:
      - MONGO_URI=mongodb://${MONGO_USER:-todoadmin}:${MONGO_PASSWORD:-changeme}@mongo:27017/${MONGO_DBNAME:-claude_todo}?authSource=admin
      - MONGO_DBNAME=${MONGO_DBNAME:-claude_todo}
      - REDIS_URI=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - REDIS_MCP_URI=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/1
      - SECRET_KEY=${SECRET_KEY}
      - REFRESH_SECRET_KEY=${REFRESH_SECRET_KEY}
      - BASE_URL=${BASE_URL:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - SEARCH_INDEX_DIR=/app/search_index
      - DOCSITE_ASSETS_DIR=/app/docsite_assets
      - DOCSITE_INDEX_DIR=/app/search_index_docsites
      - BOOKMARK_ASSETS_DIR=/app/bookmark_assets
      - BOOKMARK_INDEX_DIR=/app/search_index_bookmarks
      # Sidecar role — no API, all writers.
      - ENABLE_API=0
      - ENABLE_INDEXERS=1
      - ENABLE_CLIP_QUEUE=1
      - WEB_CONCURRENCY=1
    volumes:
      - search_index:/app/search_index
      - docsite_assets:/app/docsite_assets
      - docsite_index:/app/search_index_docsites
      - bookmark_assets:/app/bookmark_assets
      - bookmark_index:/app/search_index_bookmarks
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    restart: unless-stopped
    networks:
      - todo-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: todo-frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - todo-net

  mongo:
    image: mongo:7
    container_name: todo-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-todoadmin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    restart: unless-stopped
    networks:
      - todo-net

  redis:
    image: redis:7-alpine
    container_name: todo-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped
    networks:
      - todo-net

  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    container_name: todo-backup
    environment:
      - MONGO_URI=mongodb://${MONGO_USER:-todoadmin}:${MONGO_PASSWORD:-changeme}@mongo:27017/${MONGO_DBNAME:-claude_todo}?authSource=admin
      - MONGO_DBNAME=${MONGO_DBNAME:-claude_todo}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
      - BACKUP_CRON=${BACKUP_CRON:-0 3 * * *}
    volumes:
      - docsite_assets:/data/docsite_assets:ro
      - bookmark_assets:/data/bookmark_assets:ro
      - backups:/backups
    depends_on:
      mongo:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped
    networks:
      - todo-net

volumes:
  mongo_data:
  redis_data:
  search_index:
  docsite_assets:
  docsite_index:
  bookmark_assets:
  bookmark_index:
  agent_releases:
  backups:

networks:
  todo-net:
    name: todo-network
