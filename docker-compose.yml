services:
  nginx:
    image: nginx:alpine
    container_name: todo-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    networks:
      - todo-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo-backend
    environment:
      - MONGO_URI=mongodb://${MONGO_USER:-todoadmin}:${MONGO_PASSWORD:-changeme}@mongo:27017/${MONGO_DBNAME:-claude_todo}?authSource=admin
      - MONGO_DBNAME=${MONGO_DBNAME:-claude_todo}
      - REDIS_URI=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - REDIS_MCP_URI=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/1
      - SECRET_KEY=${SECRET_KEY}
      - REFRESH_SECRET_KEY=${REFRESH_SECRET_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - INIT_ADMIN_EMAIL=${INIT_ADMIN_EMAIL:-}
      - INIT_ADMIN_PASSWORD=${INIT_ADMIN_PASSWORD:-}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - todo-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: todo-frontend
    restart: unless-stopped
    networks:
      - todo-net

  mongo:
    image: mongo:7
    container_name: todo-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-todoadmin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - todo-net

  redis:
    image: redis:7-alpine
    container_name: todo-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - todo-net

volumes:
  mongo_data:
  redis_data:

networks:
  todo-net:
    name: todo-network
