services:
  # docker-socket-proxy: Traefik に Docker API を安全に公開する。
  # Windows Docker Desktop では /var/run/docker.sock の直接マウントが
  # Traefik から見えないため、このプロキシを経由する。
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: todo-docker-socket-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1   # コンテナラベル読み取りに必要
      EVENTS: 1       # コンテナ起動/停止イベントに必要
      NETWORKS: 1     # ネットワーク情報に必要
      INFO: 1         # Traefik の初期 /info 呼び出しに必要
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - todo-net

  traefik:
    # latest (v3.6+) を使うこと。v3.3 以前は Docker API 交渉に /v1.24/version を
    # 使用しており、Docker 29.x (最小 API v1.44) および docker-socket-proxy に
    # 拒否されて Docker provider が起動しない。v3.6+ は /v1.51 を使うため問題なし。
    image: traefik:latest
    container_name: todo-traefik
    ports:
      - "8080:80"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    depends_on:
      - docker-socket-proxy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    networks:
      - todo-net

  # ── backend (API workers, multi-worker default) ────────
  #
  # The API container runs the HTTP / MCP / WebSocket / chat /
  # agent transport surface with ``WEB_CONCURRENCY=4`` by
  # default. Tantivy writes and the clip queue run in the
  # ``backend-indexer`` sidecar, so this container sets
  # ``ENABLE_INDEXERS=0 ENABLE_CLIP_QUEUE=0``.
  #
  # Rollback to single-process mode (emergency):
  #   ENABLE_INDEXERS=1 ENABLE_CLIP_QUEUE=1 WEB_CONCURRENCY=1 \
  #   docker compose up -d
  # and stop the backend-indexer container. The tantivy volumes
  # are still mounted below so the rollback path still works
  # without editing docker-compose.yml.
  #
  # See docs/architecture/multi-worker-sidecar.md for the full
  # topology diagram and the migration plan.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo-backend
    labels:
      - "traefik.enable=true"
      # Router: /api/v1/internal — 外部アクセスをブロック (最高優先度)
      - "traefik.http.routers.backend-internal.rule=PathPrefix(`/api/v1/internal`)"
      - "traefik.http.routers.backend-internal.entrypoints=web"
      - "traefik.http.routers.backend-internal.priority=200"
      - "traefik.http.routers.backend-internal.middlewares=internal-block@file"
      - "traefik.http.routers.backend-internal.service=backend-svc"
      # Router: MCP — sticky cookie で同一 backend に固定
      - "traefik.http.routers.backend-mcp.rule=PathPrefix(`/mcp`)"
      - "traefik.http.routers.backend-mcp.entrypoints=web"
      - "traefik.http.routers.backend-mcp.middlewares=security-headers@file,compress@file"
      - "traefik.http.routers.backend-mcp.service=backend-mcp-svc"
      # Router: その他すべてのバックエンドパス (/api, /health, /.well-known, /install)
      # /install/{code} は supervisor-only 配備モデルの bootstrap (anonymous PS スクリプト返却)
      - "traefik.http.routers.backend.rule=PathPrefix(`/api`) || PathPrefix(`/.well-known`) || Path(`/health`) || PathPrefix(`/install`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.routers.backend.middlewares=security-headers@file,compress@file"
      - "traefik.http.routers.backend.service=backend-svc"
      # Service: 汎用
      - "traefik.http.services.backend-svc.loadbalancer.server.port=8000"
      # Service: MCP 専用 — sticky cookie でマルチワーカー時も同一コンテナに固定
      - "traefik.http.services.backend-mcp-svc.loadbalancer.server.port=8000"
      - "traefik.http.services.backend-mcp-svc.loadbalancer.sticky.cookie.name=_sticky_mcp"
      - "traefik.http.services.backend-mcp-svc.loadbalancer.sticky.cookie.httpOnly=true"
      - "traefik.http.services.backend-mcp-svc.loadbalancer.sticky.cookie.sameSite=strict"
    environment:
      - MONGO_URI=mongodb://${MONGO_USER:-todoadmin}:${MONGO_PASSWORD:-changeme}@mongo:27017/claude_todo?authSource=admin
      - REDIS_URI=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - REFRESH_SECRET_KEY=${REFRESH_SECRET_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - BASE_URL=${BASE_URL:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - INIT_ADMIN_EMAIL=${INIT_ADMIN_EMAIL:-}
      - INIT_ADMIN_PASSWORD=${INIT_ADMIN_PASSWORD:-}
      # Topology flags — not for .env, set here only
      - ENABLE_API=1
      - ENABLE_INDEXERS=0
      - ENABLE_CLIP_QUEUE=0
      - ENABLE_ERROR_TRACKER_WORKER=0
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-4}
    volumes:
      # Index volumes stay mounted so the emergency rollback
      # (ENABLE_INDEXERS=1) still writes to the correct path.
      # The sidecar also mounts these — only one writer at a
      # time is safe, which the ENABLE_INDEXERS flag enforces.
      - ${DOCKER_DATA_ROOT:-D:/docker-data/claude-todo}/search_index:/app/search_index
      - ${DOCKER_DATA_ROOT:-D:/docker-data/claude-todo}/docsite_assets:/app/docsite_assets
      - ${DOCKER_DATA_ROOT:-D:/docker-data/claude-todo}/docsite_index:/app/search_index_docsites
      - ${DOCKER_DATA_ROOT:-D:/docker-data/claude-todo}/bookmark_assets:/app/bookmark_assets
      - ${DOCKER_DATA_ROOT:-D:/docker-data/claude-todo}/bookmark_index:/app/search_index_bookmarks
      - ${DOCKER_DATA_ROOT:-D:/docker-data/claude-todo}/agent_releases:/app/agent_releases
      - ${DOCKER_DATA_ROOT:-D:/docker-data/claude-todo}/supervisor_releases:/app/supervisor_releases
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    restart: unless-stopped
    networks:
      - todo-net

  # ── backend-indexer (sidecar, always runs) ─────────────
  #
  # Owns the Tantivy writers and the clip queue worker. The
  # ``backend`` service runs with ENABLE_INDEXERS=0 and
  # ENABLE_CLIP_QUEUE=0 by default (see above), and this
  # container picks up the slack:
  #   - Subscribes to the ``index:tasks`` Redis Stream
  #     published by the backend API workers.
  #   - Re-reads each notified document from MongoDB before
  #     updating its Tantivy index.
  #   - Runs ``clip_queue.recover_pending()`` at startup and
  #     processes new bookmark clip requests.
  #
  # WEB_CONCURRENCY MUST be 1 — Tantivy IndexWriter is a
  # single-writer resource, so more than one worker here
  # corrupts the index.
  #
  # Emergency rollback: stop this container and flip the
  # backend service's ENABLE_INDEXERS / ENABLE_CLIP_QUEUE back
  # to 1 (plus WEB_CONCURRENCY=1). No data migration needed.
  backend-indexer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo-backend-indexer
    environment:
      - MONGO_URI=mongodb://${MONGO_USER:-todoadmin}:${MONGO_PASSWORD:-changeme}@mongo:27017/claude_todo?authSource=admin
      - REDIS_URI=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - REFRESH_SECRET_KEY=${REFRESH_SECRET_KEY}
      - BASE_URL=${BASE_URL:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      # Sidecar role — no API, all writers.
      - ENABLE_API=0
      - ENABLE_INDEXERS=1
      - ENABLE_CLIP_QUEUE=1
      - ENABLE_ERROR_TRACKER_WORKER=1
      - WEB_CONCURRENCY=1
    volumes:
      - ${DOCKER_DATA_ROOT:-D:/docker-data/claude-todo}/search_index:/app/search_index
      - ${DOCKER_DATA_ROOT:-D:/docker-data/claude-todo}/docsite_assets:/app/docsite_assets
      - ${DOCKER_DATA_ROOT:-D:/docker-data/claude-todo}/docsite_index:/app/search_index_docsites
      - ${DOCKER_DATA_ROOT:-D:/docker-data/claude-todo}/bookmark_assets:/app/bookmark_assets
      - ${DOCKER_DATA_ROOT:-D:/docker-data/claude-todo}/bookmark_index:/app/search_index_bookmarks
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    restart: unless-stopped
    networks:
      - todo-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Phase 1.5: enable /dev/preview on this staging-style stack
        # so we can eyeball Phase 2-6 progress without spinning up
        # local vite dev. Set to "" for true-production deploys.
        VITE_DEV_PREVIEW: "1"
    container_name: todo-frontend
    labels:
      - "traefik.enable=true"
      # SPA catch-all (最低優先度)
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.routers.frontend.middlewares=security-headers@file,compress@file"
      - "traefik.http.services.frontend-svc.loadbalancer.server.port=3000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - todo-net

  mongo:
    image: mongo:7
    container_name: todo-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-todoadmin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
    volumes:
      - ${DOCKER_DATA_ROOT:-D:/docker-data/claude-todo}/mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    restart: unless-stopped
    networks:
      - todo-net

  redis:
    image: redis:7-alpine
    container_name: todo-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - ${DOCKER_DATA_ROOT:-D:/docker-data/claude-todo}/redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped
    networks:
      - todo-net

  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    container_name: todo-backup
    environment:
      - MONGO_URI=mongodb://${MONGO_USER:-todoadmin}:${MONGO_PASSWORD:-changeme}@mongo:27017/${MONGO_DBNAME:-claude_todo}?authSource=admin
      - MONGO_DBNAME=${MONGO_DBNAME:-claude_todo}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
      - BACKUP_CRON=${BACKUP_CRON:-0 3 * * *}
    volumes:
      - ${DOCKER_DATA_ROOT:-D:/docker-data/claude-todo}/docsite_assets:/data/docsite_assets:ro
      - ${DOCKER_DATA_ROOT:-D:/docker-data/claude-todo}/bookmark_assets:/data/bookmark_assets:ro
      - ${DOCKER_DATA_ROOT:-D:/docker-data/claude-todo}/backups:/backups
    depends_on:
      mongo:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped
    networks:
      - todo-net

networks:
  todo-net:
    name: todo-network
