# Real モード用テストインフラ
# 使い方:
#   docker-compose -f docker-compose.test.yml up -d
#   MONGO_URI=mongodb://localhost:27018 REDIS_URI=redis://localhost:6380/1 TEST_MODE=real pytest tests/
#   docker-compose -f docker-compose.test.yml down

services:
  mongo-test:
    image: mongo:7
    container_name: todo-mongo-test
    ports:
      - "27018:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10
    tmpfs:
      - /data/db  # ディスクを使わずメモリ上で高速動作

  redis-test:
    image: redis:7-alpine
    container_name: todo-redis-test
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
